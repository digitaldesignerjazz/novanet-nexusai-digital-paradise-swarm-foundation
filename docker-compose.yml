version: '3.8'

services:
  novanet-node:
    build:
      context: .
      dockerfile: Dockerfile.novanet
    image: novanet-node:latest
    container_name: novanet-paradise-node
    restart: unless-stopped
    ports:
      - "12345:12345/udp"
      - "12345:12345/tcp"
    volumes:
      - ./config/novanet:/etc/novanet
      - ./data/novanet:/var/lib/novanet
    environment:
      - NODE_NAME=DigitalParadise-Hannover-01
      - NEXUS_INTEGRATION=true
      - MESH_NETWORK=paradise-swarm
    networks:
      - paradise-mesh
    healthcheck:
      test: ["CMD", "echo", "healthy"]
      interval: 30s
      timeout: 10s
      retries: 3

  nexus-ai-swarm:
    build:
      context: .
      dockerfile: Dockerfile.nexus
    image: nexus-ai-swarm:latest
    container_name: nexus-ai-orchestrator
    restart: unless-stopped
    depends_on:
      novanet-node:
        condition: service_started
    environment:
      - MESH_ENDPOINT=novanet-node:12345
      - SWARM_SIZE=4
      - LLM_PROVIDER=local
      - PARADISE_MODE=demo
    volumes:
      - ./examples:/app/examples
      - ./data/nexus:/app/data
    networks:
      - paradise-mesh
    # Runs the demo by default; override for production agents
    command: python3 examples/swarm_agent_demo.py

  # Optional monitoring (uncomment if desired)
  # monitoring:
  #   image: grafana/grafana:latest
  #   container_name: paradise-monitoring
  #   ports:
  #     - "3000:3000"
  #   volumes:
  #     - grafana-data:/var/lib/grafana
  #   networks:
  #     - paradise-mesh

networks:
  paradise-mesh:
    driver: bridge

